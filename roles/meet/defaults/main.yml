---
# Automatically generated by aar-doc
# UID of the `meet` user, used for the podman role.
st_meet_uid: 1100
# GID of the `meet` group, used for the podman role.
st_meet_gid: '{{ st_meet_uid }}'
# Triggers the installation of meet.
st_meet_enabled: false
# Remote path to the base directory for meet app.
st_meet_dir: /opt/meet/meet
# Tag of the meet docker image to deploy.
st_meet_tag: latest
# Local path to the custom template to use for meet env file.
st_meet_backend_env_template: meet/backend_env.j2
# Content of the default backend_env_template, not used if st_meet_backend_env_template is defined.
st_meet_backend_env: ''
# Whether to run database migrations on meet backend startup.
st_meet_backend_run_migrations: true
# Local path to the custom template to use for meet frontend env file.
st_meet_frontend_env_template: meet/frontend_env.j2
# Content of the default frontend_env_template, not used if st_meet_frontend_env_template is defined.
st_meet_frontend_env: ''
# Local path to the custom template to use for meet compose file.
st_meet_compose_template: meet/compose.yaml.j2
# Whether or not to trigger the rollback tasks if the meet deployment fails.
st_meet_rollback_enabled: false
# Triggers the installation of meet.
st_meet_livekit_enabled: false
# Tag of the meet docker image to deploy.
st_meet_livekit_tag: latest
# Remote path to the base directory for livekit app.
st_meet_livekit_dir: /opt/meet/livekit
# Local path to the custom template to use for meet compose file.
st_meet_livekit_compose_template: meet/compose.yaml.j2
# Whether or not to trigger the rollback tasks if the meet deployment fails.
st_meet_livekit_rollback_enabled: false
# Triggers the installation of the cadvisor container, used to send metrics to a Prometheus compatible server and logs to a Loki server.
st_meet_cadvisor_enabled: false
# The host published port of the cadvisor container.
st_meet_cadvisor_port: '127.0.0.1:58080'
