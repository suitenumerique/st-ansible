---
- name: "Create drive workers application."
  ansible.builtin.import_role:
    name: suitenumerique.st.podman
    tasks_from: application.yml
  vars:
    st_podman_user: "drive"
    st_podman_application_name: "workers"
    st_podman_application_dir: "{{ st_drive_workers_dir }}"
    st_podman_application_rollback_enabled: "{{ st_drive_workers_rollback_enabled }}"
    st_podman_application_compose_template: "{{ st_drive_workers_compose_template }}"
    st_podman_application_files:
      - src: "{{ st_drive_workers_env_template }}"
        dest: "env"
