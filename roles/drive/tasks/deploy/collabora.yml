---
- name: "Expand custom font list into file items."
  ansible.builtin.set_fact:
    _collabora_font_files: >-
      {{
        _collabora_font_files | default([]) + [{
          'src': item,
          'dest': 'fonts/' ~ (item | basename),
          'template': false,
          'mode': '0640',
          'container_uid': 1001,
          'container_gid': 0
        }]
      }}
  loop: >-
    {{ query('fileglob', st_drive_collabora_fonts_src ~ '/*.ttf')
       + query('fileglob', st_drive_collabora_fonts_src ~ '/*.otf') }}
  when: st_drive_collabora_fonts_src | length > 0

- name: "Create collabora application."
  ansible.builtin.import_role:
    name: suitenumerique.st.podman
    tasks_from: application.yml
  vars:
    st_podman_user: "drive"
    st_podman_application_name: "collabora"
    st_podman_application_dir: "{{ st_drive_collabora_dir }}"
    st_podman_application_rollback_enabled: "{{ st_drive_collabora_rollback_enabled }}"
    st_podman_application_compose_template: "{{ st_drive_collabora_compose_template }}"
    st_podman_application_directories:
      - name: "fonts"
        container_uid: 1001
        container_gid: 0
        when: st_drive_collabora_fonts_src | length > 0
    st_podman_application_files: >-
      {{
        [{'src': st_drive_collabora_env_template, 'dest': 'env'}]
        + (_collabora_font_files | default([]))
      }}
