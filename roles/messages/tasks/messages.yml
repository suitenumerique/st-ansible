---
- name: "Create messages application."
  ansible.builtin.import_role:
    name: suitenumerique.st.podman
    tasks_from: application.yml
  vars:
    st_podman_user: "messages"
    st_podman_application_name: "messages"
    st_podman_application_sdnotify: "{{ st_messages_sdnotify }}"
    st_podman_application_compose_template: "{{ st_messages_compose_template }}"
    st_podman_application_files:
      - src: "{{ st_messages_backend_env_template }}"
        dest: "backend_env"
      - src: "{{ st_messages_frontend_env_template }}"
        dest: "frontend_env"

- name: "Play messages migrations."
  become: true
  become_user: "messages"
  become_method: ansible.builtin.sudo
  become_flags: "-i"
  run_once: true
  register: migration_result
  changed_when: "'No migrations to apply.' not in migration_result.stdout"
  when: st_messages_backend_run_migrations
  retries: 3
  delay: 10
  until: migration_result.rc == 0
  ansible.builtin.shell:
    chdir: "{{ st_messages_dir }}"
    cmd: |
      set -eu
      podman-compose run --rm --name messages_backend_migrations backend python manage.py migrate --noinput
