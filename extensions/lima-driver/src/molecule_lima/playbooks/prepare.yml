---
- name: Prepare Lima instances
  hosts: all
  gather_facts: true
  become: true
  tasks:
    - name: Update package cache (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install common packages
      ansible.builtin.package:
        name:
          - curl
          - wget
          - git
        state: present
