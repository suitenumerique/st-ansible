---
- name: "Deploy mta-in."
  hosts: mta_in
  serial: 1
  tasks:
    - name: "Install messages base."
      become: true
      become_user: root
      ansible.builtin.import_role:
        name: suitenumerique.st.messages

    # NOTE: Splitting in two tasks is not mandatory, you could also play
    # the whole thing as root by appending the variables on the first task.
    # This setup is useful for CI/CD pipelines without root access.
    - name: "Deploy mta-in application."
      become: true
      become_user: messages
      become_method: ansible.builtin.sudo
      become_flags: "-i"
      ansible.builtin.import_role:
        name: suitenumerique.st.messages
        tasks_from: deploy.yml
      vars:
        st_messages_mta_in_enabled: true
        st_messages_mta_in_rollback_enabled: "{{ true if inventory_hostname == ansible_play_hosts_all[0] else false }}"
        st_messages_mta_in_tag: vx.y.z # check https://github.com/suitenumerique/messages/releases
        st_messages_mta_in_env: |
          MDA_API_SECRET=changeme
          MDA_API_BASE_URL=https://messages.example.com
          MYHOSTNAME=mx.example.com
          # ... check https://github.com/suitenumerique/messages/blob/main/docs/env.md#mta-settings
